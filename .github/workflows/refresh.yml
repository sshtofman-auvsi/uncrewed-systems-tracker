name: Refresh Regulatory Tracker

on:
  push:
    paths:
      - "scripts/**"
      - "docs/template.html"
      - ".github/workflows/refresh.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: refresh-tracker
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build dashboard (live)
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
          COURTLISTENER_TOKEN: ${{ secrets.COURTLISTENER_TOKEN }}
        run: python scripts/build.py

      - name: Commit refreshed dashboard
        run: |
          git config user.name "regulatory-tracker[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/data.json
          if git diff --staged --quiet; then
            echo "No data changes this run."
          else
            git commit -m "Refresh tracker data ($(date -u +%Y-%m-%dT%H:%MZ)) [skip ci]"
            git push
          fi
